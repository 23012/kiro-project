<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: 'Segoe UI', sans-serif; background: #f5f6f8; }
    .header { background: #0D2D6B; color: #fff; padding: 14px 16px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .body { padding: 14px 16px; }
    textarea {
      width: 100%; height: 180px; border: 1px solid #d6dae0; border-radius: 8px;
      padding: 10px; font-size: 12px; font-family: 'Consolas', monospace;
      resize: vertical; outline: none;
    }
    textarea:focus { border-color: #0D2D6B; }
    .btn {
      width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 8px;
      background: #0D2D6B; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #1E4DA0; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: 12px; color: #5a5f69; text-align: center; min-height: 18px; }
    .status.success { color: #1a7f37; }
    .status.error { color: #a32d2d; }
  </style>
</head>
<body>
  <div class="header">
    <h1>CAU 업적 자동입력</h1>
    <p>챗봇에서 복사한 JSON을 붙여넣으세요</p>
  </div>
  <div class="body">
    <textarea id="jsonInput" placeholder='{"gubun1": "R01100", "gubun2": "R01104", ...}'></textarea>
    <button class="btn" id="fillBtn">포털에 자동 입력</button>
    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
