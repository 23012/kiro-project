<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUR 처방 이력 조회</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="root">

  <!-- 환자 카드 -->
  <div class="pt-card">
    <div class="pt-card-top">
      <span style="color:#fff;font-size:15px;font-weight:500">카우누리 EMR · 응급의학과</span>
      <span class="system">DUR 처방 이력 조회</span>
    </div>
    <div class="pt-profile-row">
      <div class="pt-avatar">
        <svg viewBox="0 0 48 48" width="60" height="60" fill="none">
          <rect width="48" height="48" rx="8" fill="#E6F1FB"/>
          <circle cx="24" cy="17" r="7" fill="#7EB8D4"/>
          <path d="M12 40c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#7EB8D4"/>
        </svg>
      </div>
      <div class="pt-info">
        <span class="pt-name">김원태</span>
        <div class="pt-chips-row">
          <span class="pt-chip">남 · 43세</span>
          <span class="pt-chip">등록번호 2309-0001</span>
          <span class="pt-chip">BED C2</span>
          <span class="triage-chip triage-2">Triage Lv.2 긴급</span>
        </div>
      </div>
    </div>
    <div class="pt-meta-grid">
      <div class="pt-meta-cell">
        <div class="pt-meta-label">내원일시</div>
        <div class="pt-meta-value">2026.03.20 23:40</div>
      </div>
      <div class="pt-meta-cell">
        <div class="pt-meta-label">발병일시</div>
        <div class="pt-meta-value">2026.03.20 23:00</div>
      </div>
      <div class="pt-meta-cell">
        <div class="pt-meta-label">내원수단</div>
        <div class="pt-meta-value">자동차 (자가)</div>
      </div>
      <div class="pt-meta-cell">
        <div class="pt-meta-label">진료 전문의</div>
        <div class="pt-meta-value">김찬웅</div>
      </div>
    </div>
  </div>

  <!-- 주증상 경고 배너 -->
  <div class="dx-banner lv2">
    <div class="dx-icon lv2">!</div>
    <div class="dx-right">
      <div class="dx-title">주증상 및 진단명</div>
      <div class="dx-tags">
        <span class="dx-tag main">R42 · Dizziness (어지럼증)</span>
        <span class="dx-tag sub">오심 동반 의심</span>
      </div>
    </div>
  </div>

  <!-- 과거 이력 조회 바 -->
  <div class="history-query-bar">
    <span class="filter-label">기간</span>
    <select class="filter-select" id="filterPeriod" onchange="applyFilter()">
      <option value="all">전체</option>
      <option value="6m">최근 6개월</option>
      <option value="1y">최근 1년</option>
      <option value="2y">최근 2년</option>
      <option value="3y">최근 3년</option>
      <option value="custom">직접 입력</option>
    </select>
    <span id="customDateRange" style="display:none;align-items:center;gap:4px">
      <input type="date" class="filter-date" id="filterDateFrom" value="2024-01-01" onchange="applyFilter()">
      <span style="font-size:12px;color:var(--color-text-tertiary)">~</span>
      <input type="date" class="filter-date" id="filterDateTo" value="2026-03-20" onchange="applyFilter()">
    </span>
    <span class="filter-label">진료과</span>
    <select class="filter-select" id="filterDept" onchange="applyFilter()">
      <option value="all">전체</option>
      <option value="응급의학과">응급의학과</option>
      <option value="감염내과">감염내과</option>
      <option value="비뇨의학과">비뇨의학과</option>
      <option value="산부인과">산부인과</option>
      <option value="순환기내과">순환기내과</option>
      <option value="신경과">신경과</option>
      <option value="신경외과">신경외과</option>
      <option value="신장내과">신장내과</option>
      <option value="안과">안과</option>
      <option value="외과">외과</option>
      <option value="이비인후과">이비인후과</option>
      <option value="정형외과">정형외과</option>
      <option value="심장혈관흉부외과">심장혈관흉부외과</option>
      <option value="혈액종양내과">혈액종양내과</option>
      <option value="호흡기알레르기내과">호흡기알레르기내과</option>
    </select>
    <button class="history-search-btn" onclick="searchHistory()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      조회
    </button>
  </div>

  <!-- 과거 처방 이력 -->
  <div id="historySection" style="display:none">
    <div class="history-result-info" id="resultInfo"></div>
    <div id="historyCards"></div>
  </div>

</div>

<!-- 팝업 -->
<div class="popup-overlay" id="ov">
  <div class="popup" id="pop"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
