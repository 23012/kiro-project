<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>약 처방 지원 시스템 — 환자 중심 처방 분석</title>
<link rel="stylesheet" href="css/patient-popup.css">
</head>
<body>
<div class="wrap">
  <!-- 헤더 -->
  <div class="header">
    <div>
      <div class="header-title">약 처방 지원 시스템</div>
      <div class="header-meta">카우누리 DUR 연동 | 응급실</div>
    </div>
    <div class="header-right">
      <span class="triage-badge triage-2">Triage Lv.2</span>
      <div class="header-time">BED C2</div>
    </div>
  </div>

  <!-- 상단: 환자 정보 -->
  <div class="patient-section">
    <div class="pi-bar">
      <div class="pi-avatar">김</div>
      <div class="pi-main">
        <div class="pi-name">김원태</div>
        <div class="pi-detail">남성 · 43세</div>
      </div>
      <div class="pi-badges">
        <div class="pi-badge id">환자등록번호 00000000</div>
        <div class="pi-badge">응급의학과 · 김찬웅</div>
        <div class="pi-badge">내원수단: 기타 자동차</div>
      </div>
    </div>
    <div class="visit-bar">
      <span class="visit-label">내원 일시</span>
      <span class="visit-value">2026.03.20 23:40</span>
      <div class="visit-divider"></div>
      <span class="visit-label">발병 일시</span>
      <span class="visit-value">2026.03.20 23:00</span>
      <div class="visit-divider"></div>
      <span class="visit-label">전문의 진료</span>
      <span class="visit-value">2026.03.20 23:50 (김찬웅)</span>
      <div class="visit-divider"></div>
      <span class="visit-label">내원 사유</span>
      <span class="visit-value">질병</span>
    </div>
    <div class="dx-section">
      <div class="dx-title">주증상 및 진단명</div>
      <div class="dx-card alert">
        <span class="dx-code">C0012833</span>
        <span class="dx-name">Dizziness (어지러움)</span>
        <span class="dx-warn">⚠ 주증상</span>
      </div>
    </div>
  </div>
""
